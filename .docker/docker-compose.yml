version: '3.8'

services:
  mysql:
    image: mysql:8.0.33
    container_name: coffeeshop-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_here
      MYSQL_USER: db_user
      MYSQL_PASSWORD: db_password_here
    ports:
      - "3306:3306"
    volumes:
      - ./vol/mysql:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - coffeeshop-network

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: coffeeshop-mq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"  
      - "15672:15672" 
    volumes:
      - ./vol/rabbitmq:/var/lib/rabbitmq
    networks:
      - coffeeshop-network

networks:
  coffeeshop-network:
    driver: bridge